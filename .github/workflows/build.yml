name: Build VoiceFlow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: VoiceFlow.exe
            asset_name: VoiceFlow-Windows.exe
          - os: macos-latest
            artifact_name: VoiceFlow
            asset_name: VoiceFlow-Mac
          - os: ubuntu-latest
            artifact_name: VoiceFlow
            asset_name: VoiceFlow-Linux

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install macOS Dependencies
      if: matrix.os == 'macos-latest'
      run: |
        brew install portaudio

    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgirepository1.0-dev gcc libcairo2-dev pkg-config python3-dev gir1.2-gtk-3.0 portaudio19-dev
        sudo apt-get install -y gir1.2-webkit2-4.1 || sudo apt-get install -y gir1.2-webkit2-4.0

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ "${{ matrix.os }}" = "macos-latest" ]; then
          export CFLAGS="-I/opt/homebrew/include"
          export LDFLAGS="-L/opt/homebrew/lib"
        fi
        pip install -r requirements.txt
        pip install pyinstaller pywebview

    - name: Build with PyInstaller
      run: python build.py

    # Only Windows has the Inno Setup installer compilation (optional, we provide single .exe now)
    - name: Compile Inno Setup (Windows Only)
      if: matrix.os == 'windows-latest'
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: VoiceFlow.iss
        options: /O+

    - name: Upload Artifacts (Windows Installer)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: VoiceFlow_Setup
        path: dist/VoiceFlow_Setup.exe

    - name: Upload Artifacts (Raw Builds)
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows Installer
        uses: actions/download-artifact@v4
        with:
          name: VoiceFlow_Setup
          path: release_assets/
          
      - name: Download Mac App
        uses: actions/download-artifact@v4
        with:
          name: VoiceFlow-Mac
          path: mac_temp/
          
      - name: Download Linux App
        uses: actions/download-artifact@v4
        with:
          name: VoiceFlow-Linux
          path: linux_temp/
          
      - name: Prepare Assets
        run: |
          mkdir -p release_assets
          cd mac_temp
          zip -r ../release_assets/VoiceFlow_Mac.zip .
          cd ../linux_temp
          mv VoiceFlow ../release_assets/VoiceFlow_Linux || mv * ../release_assets/VoiceFlow_Linux
          cd ..
          
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest"
          name: "VoiceFlow (Latest Build)"
          body: "This release is automatically compiled and uploaded by GitHub Actions! No manual upload required."
          files: release_assets/*
          make_latest: true
