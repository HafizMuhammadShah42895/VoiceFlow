name: Build VoiceFlow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: VoiceFlow.exe
            asset_name: VoiceFlow-Windows.exe
          - os: macos-latest
            artifact_name: VoiceFlow
            asset_name: VoiceFlow-Mac
          - os: ubuntu-latest
            artifact_name: VoiceFlow
            asset_name: VoiceFlow-Linux

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install macOS Dependencies
      if: matrix.os == 'macos-latest'
      run: |
        brew install portaudio

    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgirepository1.0-dev gcc libcairo2-dev pkg-config python3-dev gir1.2-gtk-3.0 gir1.2-webkit2-4.0 portaudio19-dev

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ "${{ matrix.os }}" = "macos-latest" ]; then
          export CFLAGS="-I/opt/homebrew/include"
          export LDFLAGS="-L/opt/homebrew/lib"
        fi
        pip install -r requirements.txt
        pip install pyinstaller pywebview

    - name: Build with PyInstaller
      run: python build.py

    # Only Windows has the Inno Setup installer compilation (optional, we provide single .exe now)
    - name: Compile Inno Setup (Windows Only)
      if: matrix.os == 'windows-latest'
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: VoiceFlow.iss
        options: /O+

    - name: Upload Artifacts (Windows Installer)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: VoiceFlow_Setup
        path: dist/VoiceFlow_Setup.exe

    - name: Upload Artifacts (Raw Builds)
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: dist/${{ matrix.artifact_name }}
